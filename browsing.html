<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Daily Plan</title>

  <style>
    body {
      font-family: "Menlo", "Consolas", "Monaco", monospace;
      background: #FEF7FF;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 400px;
      max-width: 90%;
    }

    h1 {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px 0;
      font-size: 16px;
      border: none;
      border-bottom: 1px solid #ddd;
      outline: none;
      margin-bottom: 10px;
      background: transparent;
    }

    input:focus {
      border-bottom-color: #111;
      animation: pulse 1.2s infinite;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    li.done {
      text-decoration: line-through;
      color: #ddd;
    }

    .edit-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
      background: transparent;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Intention for browsing:</h1>
    <input id="todo-input" autocomplete="off" />
    <ul id="todo-list"></ul>
  </div>

  <script>
    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');

    const todayKey = new Date().toISOString().split('T')[0];

    const stored = JSON.parse(localStorage.getItem('daily-todos') || '{}');
    if (!stored.date || stored.date !== todayKey) {
      localStorage.setItem('daily-todos', JSON.stringify({ date: todayKey, items: [] }));
    }

    function isURL(text) {
      return /^(https?:\/\/)?([\w-]+\.)+[\w-]{2,}(\/.*)?$/.test(text);
    }

    function normalizeURL(url) {
      if (!url.startsWith('http')) return 'https://' + url;
      return url;
    }

    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function loadTodos() {
      const data = JSON.parse(localStorage.getItem('daily-todos'));
      list.innerHTML = '';

      // sort: undone first, done last
      const sorted = [...data.items].sort((a, b) => a.done - b.done);

      sorted.forEach((item) => {
        const li = document.createElement('li');
        li.textContent = item.text;

        if (item.done) li.classList.add('done');

        // toggle done
        li.onclick = () => {
          item.done = !item.done;
          saveTodos(data.items);
        };

        // double click to edit
        li.ondblclick = (e) => {
          e.stopPropagation();

          const edit = document.createElement('input');
          edit.className = 'edit-input';
          edit.value = item.text;

          li.innerHTML = '';
          li.appendChild(edit);
          edit.focus();

          edit.addEventListener('blur', () => finishEdit(edit, item, data));
          edit.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') finishEdit(edit, item, data);
          });
        };

        list.appendChild(li);
      });
    }

    function finishEdit(inputEl, item, data) {
      const newValue = inputEl.value.trim();
      if (newValue) {
        item.text = capitalize(newValue);
        saveTodos(data.items);
      } else {
        loadTodos();
      }
    }

    function saveTodos(items) {
      localStorage.setItem('daily-todos', JSON.stringify({ date: todayKey, items }));
      loadTodos();
    }

    input.addEventListener('keypress', (e) => {
      if (e.key !== 'Enter') return;

      let value = input.value.trim();
      if (!value) return;

      const data = JSON.parse(localStorage.getItem('daily-todos'));

      // search command
      if (value.toLowerCase().startsWith('s:')) {
        const query = value.slice(2).trim();
        if (query) {
          window.location.href =
            'https://www.google.com/search?q=' + encodeURIComponent(query);
        }
        input.value = '';
        return;
      }

      // URL → redirect ONLY (no list entry)
      if (isURL(value)) {
        const url = normalizeURL(value);
        input.value = '';
        window.location.href = url;
        return;
      }

      // normal item
      data.items.push({
        text: capitalize(value),
        done: false
      });

      saveTodos(data.items);
      input.value = '';
    });

    loadTodos();

    window.addEventListener('load', () => {
      input.focus();
    });
  </script>
</body>
</html>
